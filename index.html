<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SAP-C02 Study Trainer</title>
    <meta name="description" content="AWS Certified Solutions Architect - Professional SAP-C02 の非公式学習用トレーナー">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Private Study Tool</p>
        <h1>SAP-C02 Study Trainer</h1>
      </div>
      <div class="header-actions">
        <button id="exportButton" class="ghost-button" type="button">履歴出力</button>
        <button id="resetButton" class="ghost-button danger" type="button">履歴リセット</button>
      </div>
    </header>

    <main>
      <section id="homeView" class="view active-view">
        <div class="summary-grid" id="domainSummary"></div>

        <section class="panel">
          <div class="panel-title-row">
            <div>
              <p class="eyebrow">Practice</p>
              <h2>演習条件</h2>
            </div>
            <span id="totalQuestionCount" class="pill"></span>
          </div>

          <div class="form-grid">
            <fieldset>
              <legend>出題分野</legend>
              <div id="domainFilters" class="check-list"></div>
            </fieldset>

            <fieldset>
              <legend>出題状態</legend>
              <label><input type="radio" name="statusFilter" value="all" checked> すべて</label>
              <label><input type="radio" name="statusFilter" value="unanswered"> 未回答のみ</label>
              <label><input type="radio" name="statusFilter" value="incorrect"> 不正解のみ</label>
              <label><input type="radio" name="statusFilter" value="checked"> チェック済みのみ</label>
              <label><input type="radio" name="statusFilter" value="notMastered"> 未定着のみ</label>
            </fieldset>

            <fieldset>
              <legend>問題数</legend>
              <label><input type="radio" name="questionCount" value="10" checked> 10問</label>
              <label><input type="radio" name="questionCount" value="20"> 20問</label>
              <label><input type="radio" name="questionCount" value="30"> 30問</label>
              <label><input type="radio" name="questionCount" value="all"> 全問</label>
            </fieldset>

            <fieldset>
              <legend>出題方式</legend>
              <label><input id="shuffleChoices" type="checkbox" checked> 選択肢をランダム化</label>
              <label><input id="hideAnswered" type="checkbox"> 正解済みを除外</label>
            </fieldset>
          </div>

          <div class="action-row">
            <button id="startPracticeButton" class="primary-button" type="button">演習を開始</button>
            <button id="startExamButton" class="secondary-button" type="button">模試を開始（最大75問）</button>
          </div>
          <p class="note">今は土台版として少数のオリジナル問題を入れています。問題データは <code>questions.js</code> に追加できます。</p>
        </section>

        <section class="panel">
          <div class="panel-title-row">
            <div>
              <p class="eyebrow">Review</p>
              <h2>復習ショートカット</h2>
            </div>
          </div>
          <div class="shortcut-grid">
            <button id="reviewIncorrectButton" class="secondary-button" type="button">不正解だけ解く</button>
            <button id="reviewCheckedButton" class="secondary-button" type="button">チェック済みだけ解く</button>
            <button id="reviewUnansweredButton" class="secondary-button" type="button">未回答だけ解く</button>
          </div>
        </section>
      </section>

      <section id="quizView" class="view">
        <div class="quiz-shell">
          <aside class="quiz-side">
            <button id="backHomeButton" class="ghost-button" type="button">トップへ戻る</button>
            <div class="progress-card">
              <div class="progress-label">
                <span id="sessionModeLabel"></span>
                <strong id="progressText"></strong>
              </div>
              <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
              <p id="timerText" class="timer-text"></p>
            </div>
            <div id="questionGrid" class="question-grid"></div>
          </aside>

          <article class="question-panel">
            <div class="question-meta">
              <span id="domainBadge" class="pill"></span>
              <span id="tagBadges"></span>
              <button id="checkButton" class="ghost-button" type="button">チェック</button>
            </div>
            <h2 id="questionTitle"></h2>
            <p id="selectHint" class="note"></p>
            <div id="choiceList" class="choice-list"></div>
            <div id="resultBox" class="result-box hidden"></div>
            <div class="quiz-actions">
              <button id="prevButton" class="ghost-button" type="button">前へ</button>
              <button id="submitButton" class="primary-button" type="button">回答する</button>
              <button id="nextButton" class="secondary-button" type="button">次へ</button>
              <button id="finishButton" class="ghost-button danger" type="button">終了</button>
            </div>
          </article>
        </div>
      </section>

      <section id="resultView" class="view">
        <section class="panel result-panel">
          <p class="eyebrow">Result</p>
          <h2 id="resultTitle"></h2>
          <div id="resultSummary" class="result-summary"></div>
          <div id="domainResult" class="domain-result"></div>
          <div class="action-row">
            <button id="retryWrongButton" class="primary-button" type="button">今回の不正解を復習</button>
            <button id="resultHomeButton" class="secondary-button" type="button">トップへ戻る</button>
          </div>
        </section>
      </section>
    </main>

    <footer>
      <p>非公式の個人学習ツールです。AWS公式教材ではありません。問題は学習目的の独自作成です。</p>
    </footer>

    <script src="./questions.js"></script>
    <script src="./additional-questions.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
